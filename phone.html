<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Poll</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --leaf:#4C9C2E;--leaf-dark:#215732;--leaf-darkest:#1A5D00;
  --lime:#C4D600;--sage-soft:#C3EFAC;--cream:#F8FAF4;
  --ink:#181D18;--ink-2:#40493A;--muted:#707A69;--line:#DCE4D2;
}
html,body{height:100%;background:var(--cream);font-family:'Poppins',sans-serif;color:var(--ink)}
.ms{font-family:'Material Symbols Outlined';font-weight:normal;font-style:normal;line-height:1;letter-spacing:normal;text-transform:none;display:inline-block;white-space:nowrap;direction:ltr;-webkit-font-smoothing:antialiased;font-variation-settings:'FILL' 1,'wght' 500}
#app{display:flex;flex-direction:column;min-height:100vh;max-width:520px;margin:0 auto}
/* header */
.ph-head{display:flex;justify-content:space-between;align-items:center;padding:18px 22px;background:var(--leaf-dark);color:#fff}
.ph-brand{display:flex;flex-direction:column;gap:2px}
.ph-logo{font:600 18px/20px 'Poppins'}
.ph-bu{font:500 10px/12px 'Poppins';letter-spacing:1.2px;text-transform:uppercase;color:var(--sage-soft)}
.ph-room-wrap{text-align:right}
.ph-room{font:400 13px/16px 'Poppins';color:#EAF2E0}
.ph-room b{font-weight:700;letter-spacing:2px}
.ph-status{display:block;margin-top:3px;font:600 11px/14px 'Poppins'}
.ph-status[data-s="live"]{color:#BBD819}
.ph-status[data-s="offline"]{color:#FFC78A}
.ph-status[data-s="connecting"]{color:#FFD9A6}
/* body */
.ph-body{flex:1;display:flex;flex-direction:column;justify-content:center;padding:32px 22px}
/* waiting */
.ph-wait{text-align:center;display:flex;flex-direction:column;align-items:center;gap:16px}
.ph-pulse{width:64px;height:64px;border-radius:50%;background:var(--leaf);position:relative;margin-bottom:6px}
.ph-pulse::after{content:'';position:absolute;inset:0;border-radius:50%;background:var(--leaf);animation:ring 1.8s ease-out infinite}
@keyframes ring{0%{transform:scale(1);opacity:.6}100%{transform:scale(2.4);opacity:0}}
.ph-wait h2{font:600 28px/32px 'Poppins';color:var(--leaf-dark)}
.ph-wait p{font:400 16px/23px 'Poppins';color:var(--ink-2);max-width:300px}
/* poll */
.ph-kicker{font:600 12px/16px 'Poppins';letter-spacing:1.6px;text-transform:uppercase;color:var(--leaf);margin-bottom:8px}
.ph-title{font:600 26px/32px 'Poppins';color:var(--leaf-dark);letter-spacing:-.4px;margin-bottom:6px}
.ph-sub{font:400 15px/21px 'Poppins';color:var(--muted);margin-bottom:24px}
.ph-opts{display:flex;flex-direction:column;gap:14px}
.ph-opt{display:flex;align-items:center;gap:16px;width:100%;padding:18px 20px;border-radius:16px;border:2px solid var(--line);background:#fff;font:600 18px/22px 'Poppins';color:var(--ink-2);cursor:pointer;text-align:left;transition:transform .12s,border-color .15s,background .15s}
.ph-opt .ms{font-size:28px;color:var(--oc)}
.ph-opt .ph-chk{margin-left:auto;font-size:24px;color:var(--oc);opacity:0;transition:opacity .15s}
.ph-opt:active{transform:scale(.98)}
.ph-opt.sel{border-color:var(--oc);background:color-mix(in srgb,var(--oc) 8%,#fff)}
.ph-opt.sel .ph-chk{opacity:1}
.ph-text{width:100%;min-height:120px;padding:16px;border-radius:14px;border:2px solid var(--line);font:400 17px/24px 'Poppins';color:var(--ink);resize:none;outline:none;margin-bottom:14px}
.ph-text:focus{border-color:var(--leaf)}
.ph-send{width:100%;padding:18px;border:0;border-radius:9999px;background:var(--lime);color:var(--ink);font:600 18px/22px 'Poppins';cursor:pointer;margin-bottom:12px}
.ph-send:active{transform:scale(.99)}
.ph-done{text-align:center;font:500 14px/18px 'Poppins';color:var(--leaf)}
/* no-room */
.ph-error{text-align:center;padding:40px 24px;color:var(--muted);font:400 16px/24px 'Poppins'}
.ph-error b{display:block;font:700 22px/28px 'Poppins';color:var(--ink-2);margin-bottom:10px}
</style>
</head>
<body>
<div id="app"></div>
<script src="https://unpkg.com/mqtt@5.10.1/dist/mqtt.min.js"></script>
<script>
(function(){
  const POLLS = {
    mood:{type:'choice',kicker:'Pulse check',title:'How are you doing today?',sub:'Tap the one that fits — totally anonymous.',options:[{v:'low',icon:'sentiment_dissatisfied',label:'Running low',color:'#AC145A'},{v:'ok',icon:'sentiment_neutral',label:'Hanging in',color:'#DC8633'},{v:'good',icon:'sentiment_satisfied',label:'Pretty good',color:'#4C9C2E'},{v:'great',icon:'sentiment_very_satisfied',label:'Energized',color:'#215732'}]},
    proud:{type:'text',kicker:'Over to you',title:'What work are you most proud of last quarter?',sub:'A few words is perfect — it shows up on the big screen.',placeholder:'e.g. Shipped the Food Vision pilot…',max:80},
    pd:{type:'choice',kicker:'Quick one',title:'Planning to use up your PD days this year?',sub:'No wrong answer — we want you to take them.',options:[{v:'done',icon:'event_available',label:'Yes — already done',color:'#1A5D00'},{v:'soon',icon:'event',label:'Planning to',color:'#4C9C2E'},{v:'no',icon:'event_busy',label:'No',color:'#DC8633'}]},
    praise:{type:'choice',kicker:'Quick one',title:'Used Praise to recognize a colleague?',sub:"Shout-outs make someone's whole week.",options:[{v:'yes',icon:'volunteer_activism',label:'Yes I have',color:'#215732'},{v:'notyet',icon:'schedule',label:'Not yet',color:'#DC8633'}]},
    received:{type:'choice',kicker:'Follow-up',title:'For those who received a Praise — how did it feel?',sub:'Only answer if someone has praised you.',options:[{v:'great',icon:'sentiment_very_satisfied',label:'Great',color:'#1A5D00'},{v:'good',icon:'sentiment_satisfied',label:'Good',color:'#4C9C2E'},{v:'indiff',icon:'sentiment_neutral',label:'Indifferent',color:'#DC8633'}]},
    agm1:{type:'text',kicker:'AGM survey · 1 of 2',title:"What's something cool, unique or helpful you think other staff could better use?",sub:'An HR benefit, a PD course, a process or program — anything others would benefit from.',placeholder:'e.g. The mentorship program, a course I took…',max:200},
    agm2:{type:'text',kicker:'AGM survey · 2 of 2',title:'Guest speaker topics that would benefit your department and the org?',sub:'Past sessions: Unconscious Bias Training, Engaging Public Speaking.',placeholder:'e.g. A topic, a theme, or a specific speaker idea…',max:200},
  };

  const BROKERS=['wss://broker.emqx.io:8084/mqtt','wss://broker.hivemq.com:8884/mqtt','wss://test.mosquitto.org:8081/mqtt'];
  const A='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  function rand(n){let s='';for(let i=0;i<n;i++)s+=A[Math.floor(Math.random()*A.length)];return s;}
  function cid(){let c=localStorage.getItem('th-cid');if(!c){c='c'+rand(8);localStorage.setItem('th-cid',c);}return c;}

  const params=new URLSearchParams(location.search);
  const ROOM=params.get('room')||'';
  const BASE='sh/th/'+ROOM;

  const app=document.getElementById('app');
  let status='init',active=null,myVotes={},client=null,brokerIx=0;

  function setStatus(s){status=s;render();}

  function connect(){
    if(!window.mqtt||!ROOM){setStatus('offline');return;}
    setStatus('connecting');
    const url=BROKERS[brokerIx%BROKERS.length];
    let settled=false;
    try{client=window.mqtt.connect(url,{clientId:'ph_'+cid()+'_'+rand(4),clean:true,connectTimeout:6000,reconnectPeriod:4000,keepalive:30});}
    catch(e){setStatus('offline');return;}
    client.on('connect',()=>{settled=true;setStatus('live');client.subscribe(BASE+'/active',{qos:0});});
    client.on('message',(t,payload)=>{
      let d=null;try{d=JSON.parse(payload.toString());}catch(e){return;}
      if(t===BASE+'/active'){active=(d&&d.poll)||null;render();}
    });
    client.on('reconnect',()=>setStatus('connecting'));
    client.on('error',()=>{if(!settled)tryNext();});
    client.on('close',()=>{if(status==='live')setStatus('connecting');});
    setTimeout(()=>{if(!settled&&status!=='live')tryNext();},7000);
  }
  function tryNext(){brokerIx++;if(client){try{client.end(true);}catch(e){}client=null;}if(brokerIx>=BROKERS.length*2){setStatus('offline');return;}connect();}

  function vote(pollId,value){
    myVotes[pollId]=value;
    if(client&&status==='live'){client.publish(BASE+'/vote',JSON.stringify({poll:pollId,value:value,cid:cid()}),{qos:0});}
    render();
  }

  function render(){
    const sLabel=status==='live'?'● live':status==='offline'?'● offline':'● connecting';

    if(!ROOM){
      app.innerHTML=`<div class="ph-error"><b>No room code</b>Scan the QR code from the deck to join — don't open this page directly.</div>`;
      return;
    }

    const head=`<div class="ph-head">
      <div class="ph-brand"><span class="ph-logo">Second Harvest</span><span class="ph-bu">AI · Product · Tech · Town Hall</span></div>
      <div class="ph-room-wrap"><div class="ph-room">Room <b>${ROOM}</b></div><span class="ph-status" data-s="${status}">${sLabel}</span></div>
    </div>`;

    let body;
    if(!active||!POLLS[active]){
      body=`<div class="ph-wait">
        <div class="ph-pulse"></div>
        <h2>You're in.</h2>
        <p>Hang tight — a question will pop up here when we get to it. Keep this open.</p>
      </div>`;
    } else {
      const def=POLLS[active];
      const mine=myVotes[active];
      if(def.type==='choice'){
        body=`<div>
          <div class="ph-kicker">${def.kicker}</div>
          <div class="ph-title">${def.title}</div>
          <div class="ph-sub">${def.sub}</div>
          <div class="ph-opts">${def.options.map(o=>`
            <button class="ph-opt${mine===o.v?' sel':''}" data-v="${o.v}" style="--oc:${o.color}">
              <span class="ms">${o.icon}</span><span>${o.label}</span>
              <span class="ph-chk ms">check</span>
            </button>`).join('')}</div>
          ${mine?'<div class="ph-done" style="margin-top:16px">Got it — tap another to change your answer.</div>':''}
        </div>`;
      } else {
        body=`<div>
          <div class="ph-kicker">${def.kicker}</div>
          <div class="ph-title">${def.title}</div>
          <div class="ph-sub">${def.sub}</div>
          <textarea class="ph-text" maxlength="${def.max}" placeholder="${def.placeholder}">${mine||''}</textarea>
          <button class="ph-send">${mine?'Update my answer':'Send to the screen'}</button>
          ${mine?'<div class="ph-done">Sent! You can edit and send again.</div>':''}
        </div>`;
      }
    }

    app.innerHTML=head+`<div class="ph-body">${body}</div>`;

    app.querySelectorAll('.ph-opt').forEach(b=>b.addEventListener('click',()=>vote(active,b.dataset.v)));
    const send=app.querySelector('.ph-send');
    if(send)send.addEventListener('click',()=>{const t=app.querySelector('.ph-text').value.trim();if(t)vote(active,t);});
  }

  render();
  connect();
})();
</script>
</body>
</html>
